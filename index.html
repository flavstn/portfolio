<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Portfolio</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head> 
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="nav-left">
        <a href="#home">Home</a>
        <a href="#proyectos">Proyectos recientes</a>
    </div>
    <div class="nav-right">
        <div class="dropdown">
            <button class="dropbtn"><i class="fas fa-user"></i> Redes</button>
            <div class="dropdown-content">
                <a href="#" target="_blank"><i class="fab fa-github"></i> GitHub</a>
                <a href="#" target="_blank"><i class="fab fa-linkedin"></i> LinkedIn</a>
                <a href="mailto:correo@ejemplo.com"><i class="fas fa-envelope"></i> Email</a>
            </div>
        </div>
    </div>
</nav>

<!-- HERO / CV -->
<header id="home" class="hero">
    <div class="hero-left">
        <h1>Nombre Apellido</h1>
        <h2>Estudiante de Ingeniería – Robótica & Control</h2>
        <p>Breve descripción sobre ti. Tecnologías, intereses, lo que haces...</p>
        <div class="hero-buttons">
            <a href="#proyectos" class="button">Ver proyectos</a>
            <a href="#" class="button-outline">GitHub</a>
        </div>
    </div>
    <div class="hero-right">
        <img src="assets/images/profile.jpg" alt="Foto perfil">
    </div>
</header>


<!-- PROYECTOS -->
<section id="proyectos">
    <h2>Proyectos</h2>

    <h3>Electrónica</h3>
    <div class="cards-container" id="cards-electronica"></div>

    <h3>Mecatrónica</h3>
    <div class="cards-container" id="cards-mecatronica"></div>

    <h3>Software</h3>
    <div class="cards-container" id="cards-software"></div>
</section>

<!-- MODAL -->
<div id="modal" class="modal">
    <span id="close-modal" class="close">&times;</span>
    <h2 id="modal-title"></h2>
    <img id="modal-img" src="">
    <div id="modal-desc"></div>
    <div id="modal-pdf"></div>
    <a id="modal-link" target="_blank" class="button">Ver repo</a>
</div>

<script>
const modal = document.getElementById('modal');
const modalTitle = document.getElementById('modal-title');
const modalImg = document.getElementById('modal-img');
const modalDesc = document.getElementById('modal-desc');
const modalPDF = document.getElementById('modal-pdf');
const modalLink = document.getElementById('modal-link');
const closeModal = document.getElementById('close-modal');

function openModal(repoName){

    modalTitle.textContent = repoName;

    // Imagen
    modalImg.src = `https://raw.githubusercontent.com/flavstn/${repoName}/main/preview.png`;
    modalImg.onerror = () => modalImg.style.display = "none";

    // README
    fetch(`https://raw.githubusercontent.com/flavstn/${repoName}/main/README.md`)
    .then(res => res.text())
    .then(text => modalDesc.textContent = text);

    // 🔥 PDF desde GitHub Pages
    const pdfURL = `https://flavstn.github.io/${repoName}/project.pdf`;

    console.log("Repo:", repoName);
    console.log("PDF:", pdfURL);

    fetch(pdfURL)
      .then(res => {
        if(res.ok){
            modalPDF.innerHTML = `
                <iframe 
                    src="${pdfURL}" 
                    width="100%" 
                    height="500px"
                    style="border:none;">
                </iframe>

                <p>
                    <a href="${pdfURL}" target="_blank" class="button">
                        Abrir PDF
                    </a>
                </p>
            `;
        } else {
            modalPDF.innerHTML = `<p>No hay PDF disponible</p>`;
        }
      })
      .catch(() => {
            modalPDF.innerHTML = `<p>Error cargando PDF</p>`;
      });
    // ===== PDF =====
const pdfURL = `https://flavstn.github.io/${repoName}/project.pdf`;

fetch(pdfURL)
  .then(res => {
    if(res.ok){
        modalPDF.innerHTML = `
            <h3>📄 Documentación</h3>
            <iframe 
                src="${pdfURL}" 
                width="100%" 
                height="500px"
                style="border:none; border-radius:10px;">
            </iframe>

            <p>
                <a href="${pdfURL}" target="_blank" class="button">
                    Abrir PDF
                </a>
            </p>
        `;
    } else {
        modalPDF.innerHTML = `<p>No hay documentación disponible</p>`;
    }
  })
  .catch(() => {
        modalPDF.innerHTML = `<p>Error cargando PDF</p>`;
  });
    modalLink.href = `https://github.com/flavstn/${repoName}`;

    modal.classList.add('open');
}

closeModal.onclick = () => modal.classList.remove('open');
window.onclick = e => { if(e.target == modal) modal.classList.remove('open'); };

// 🔥 CARGAR REPOS
fetch('https://api.github.com/users/flavstn/repos?per_page=100', {
    headers: { Accept: "application/vnd.github.mercy-preview+json" }
})
.then(res => res.json())
.then(data => {

    const categories = {
        electronica: document.getElementById('cards-electronica'),
        mecatronica: document.getElementById('cards-mecatronica'),
        software: document.getElementById('cards-software')
    };

    const repos = data.filter(r => !r.fork)
                      .sort((a,b) => new Date(b.updated_at) - new Date(a.updated_at));

    for(const cat in categories){

        const container = categories[cat];
        container.innerHTML = '';

        const filtered = repos.filter(repo => (repo.topics || []).includes(cat));

        for(let i = 0; i < 3; i++){

            const repo = filtered[i];
            const card = document.createElement('div');
            card.classList.add('flashcard');

            if(repo){
                card.innerHTML = `
                    <div class="flashcard-inner">
                        <div class="front">
                            <h3>${repo.name}</h3>
                            <img src="https://raw.githubusercontent.com/flavstn/${repo.name}/main/preview.png">
                        </div>
                        <div class="back">
                            <p>${repo.description || 'Sin descripción'}</p>
                            <a href="javascript:void(0)" class="button" onclick="openModal('${repo.name}')">
                                Ver más
                            </a>
                        </div>
                    </div>`;
            } else {
                card.innerHTML = `<p>No hay proyecto</p>`;
            }

            container.appendChild(card);
        }
    }
});
</script>

</body>
</html>
